<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Purchase Stream</title>
    <style>
        :root {
            --neon-blue: #22d3ee;
            --gold: #facc15;
            --success: #22c55e;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(34, 211, 238, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            padding: 20px;
            text-align: center;
            font-weight: 900;
            letter-spacing: 3px;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        /* MAIN CONTAINER */
        .payment-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            /* Fading effect on top and bottom */
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        /* SCROLLING LIST */
        .payment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            will-change: transform;
            animation: scrollUp 40s linear infinite;
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* Hover/Touch par pause */
        .payment-container:active .payment-list {
            animation-play-state: paused;
        }

        /* PURCHASE CARD */
        .payment-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: 0.3s;
        }

        .user-info .name {
            color: var(--neon-blue);
            font-weight: 800;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-info .plan {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
        }

        .price-info {
            text-align: right;
        }

        .amount {
            color: var(--gold);
            font-weight: 900;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
        }

        .status {
            font-size: 10px;
            color: var(--success);
            font-weight: bold;
            margin-top: 2px;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            background: rgba(2, 6, 23, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 25px 0;
            border-top: 1px solid var(--border);
        }

        .nav-item {
            text-align: center;
            font-size: 10px;
            color: #64748b;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--neon-blue);
            font-weight: bold;
        }

        .nav-icon {
            display: block;
            font-size: 22px;
            margin-bottom: 4px;
        }

    </style>
</head>
<body>

<div class="header">
    💳 Live Purchase Stream
</div>

<div class="payment-container">
    <div class="payment-list" id="paymentList">
        </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="location.href='index.html'">
        <span class="nav-icon">🏠</span>HOME
    </div>
    <div class="nav-item active" onclick="location.href='guild.html'">
        <span class="nav-icon">🛡️</span>GUILD
    </div>
    <div class="nav-item active" onclick="location.href='Purchase.html'">
        <span class="nav-icon">💎</span>VIP
    </div>
    <div class="nav-item active" onclick="location.href='admin.html'">
        <span class="nav-icon">⚙️</span>SETTING
    </div>
</nav>

<script>
    const plans = [
        { name:"STARTER TIER", price:199 },
        { name:"PRO TIER", price:499 },
        { name:"ELITE VIP", price:999 },
        { name:"LEGENDARY", price:2499 }
    ];

    const users = [
        "ShadowX", "DarkBoy", "AlphaYT", "NoobMaster", "LegendOP", 
        "SniperKing", "GhostFF", "BlazePro", "VenomYT", "DragonLive", 
        "StormX", "CyberOP", "TitanFF", "RoyalGaming", "HunterX",
        "Killer_07", "King_Op", "Max_Power", "Silent_Kill", "Bad_Aman"
    ];

    const list = document.getElementById("paymentList");

    function getCardHTML() {
        const plan = plans[Math.floor(Math.random()*plans.length)];
        const user = users[Math.floor(Math.random()*users.length)];
        return `
            <div class="payment-card">
                <div class="user-info">
                    <div class="name">💎 ${user}</div>
                    <div class="plan">${plan.name} ACTIVATED</div>
                </div>
                <div class="price-info">
                    <div class="amount">₹${plan.price}</div>
                    <div class="status">● SUCCESS</div>
                </div>
            </div>
        `;
    }

    // Pehle se kuch cards bharne ke liye
    let initialCards = "";
    for(let i=0; i<30; i++) {
        initialCards += getCardHTML();
    }
    list.innerHTML = initialCards + initialCards;

    // Naye purchases har 3-5 second mein add karne ke liye (Optionally)
    // Lekin infinite scroll ke liye uper ka logic kaafi hai.
</script>

</body>
</html>
