<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Settlement | VIP Console</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #ffcc00;
        --accent: #22d3ee;
        --red: #ff0044;
        --bg: #020202;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--bg);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        padding-bottom: 70px; /* bottom nav space */
    }

    .bg-glow {
        position: fixed; width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
        top: -100px; right: -100px; z-index: -1;
    }

    .payment-container {
        width: 95%; max-width: 420px;
        background: var(--glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 35px;
        padding: 30px;
        position: relative;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .header-hud {
        text-align: center; margin-bottom: 25px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 15px;
    }
    .header-hud h2 {
        font-family: 'Orbitron'; font-size: 16px; letter-spacing: 3px;
        color: var(--accent); text-shadow: 0 0 10px var(--accent);
    }
    .header-hud .haider {
        font-family: 'Orbitron'; font-size: 14px; color: var(--gold);
        margin-top: 5px; text-shadow: 0 0 8px var(--gold);
    }

    .status-strip {
        display: flex; justify-content: space-between;
        font-size: 10px; font-family: 'Orbitron'; margin-bottom: 20px;
    }
    .live-dot { height: 6px; width: 6px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    .info-card {
        background: rgba(0,0,0,0.4); border: 1px solid var(--border);
        border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 25px;
    }
    #plan-title { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
    #amount-text { font-family: 'Orbitron'; font-size: 38px; color: var(--gold); margin-top: 5px; }

    .qr-wrapper {
        position: relative; background: #fff; padding: 15px;
        border-radius: 25px; width: 200px; height: 200px;
        margin: 0 auto 15px; box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
    }
    .qr-wrapper img { width: 100%; border-radius: 10px; }
    .scan-line {
        position: absolute; top: 15px; left: 15px; width: calc(100% - 30px); height: 2px;
        background: var(--accent); box-shadow: 0 0 15px var(--accent);
        animation: scan 3s infinite ease-in-out;
    }
    @keyframes scan { 0%, 100% { top: 15px; } 50% { top: calc(100% - 17px); } }

    .mobile-pay-hint {
        text-align: center; font-size: 11px; color: var(--accent);
        margin-bottom: 20px; cursor: pointer; text-decoration: underline;
    }

    .input-box { margin-bottom: 20px; }
    .input-box label { display: block; font-size: 11px; color: #555; margin-bottom: 8px; font-weight: bold; text-align: center; }
    .input-box input {
        width: 100%; padding: 16px; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
        border-radius: 15px; color: var(--gold); font-family: 'JetBrains Mono';
        outline: none; text-align: center; transition: 0.3s; font-size: 16px;
    }
    .input-box input:focus { border-color: var(--accent); }

    .pay-btn {
        width: 100%; padding: 18px; border-radius: 18px; border: none;
        background: linear-gradient(45deg, var(--accent), #1d4ed8);
        color: #fff; font-family: 'Orbitron'; font-weight: 900;
        cursor: pointer; box-shadow: 0 10px 20px rgba(34, 211, 238, 0.2);
        transition: 0.3s;
    }
    .pay-btn:active { transform: scale(0.98); }

    #success-screen {
        position: absolute; inset: 0; background: var(--bg);
        display: none; flex-direction: column; justify-content: center;
        align-items: center; border-radius: 35px; z-index: 10;
    }

    /* --- BOTTOM NAVIGATION --- */
    .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%;
        display: flex; background: var(--glass);
        border-top: 1px solid var(--border);
        backdrop-filter: blur(10px); z-index: 999;
    }
    .nav-item {
        flex: 1; text-align: center; padding: 10px 0;
        font-size: 12px; cursor: pointer; color: #aaa;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: 0.3s;
    }
    .nav-item.active, .nav-item:hover { color: var(--gold); }
    .nav-icon { font-size: 16px; margin-bottom: 2px; }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="payment-container">
    <div class="header-hud">
        <h2>SECURE SETTLEMENT</h2>
        <div class="haider">Guild Glory Bot</div>
    </div>

    <div class="status-strip">
        <div><span class="live-dot"></span> NODE: ACTIVE</div>
        <div style="color: var(--red);">TIME: <span id="timer">05:00</span></div>
    </div>

    <div class="info-card">
        <div id="plan-title">LOADING TIER...</div>
        <div id="amount-text">₹0</div>
    </div>

    <div class="qr-wrapper">
        <div class="scan-line"></div>
        <img id="qr-img" src="" alt="UPI QR">
    </div>

    <div class="mobile-pay-hint" onclick="openUpiApp()">
        📲 Mobile User? Click to Pay via App
    </div>

    <div class="input-box">
        <label>ENTER 12-DIGIT UTR / REF NO.</label>
        <input type="text" id="utr" placeholder="3XXXXXXXXXXX" maxlength="12" inputmode="numeric">
    </div>

    <button class="pay-btn" onclick="startVerify()">VERIFY TRANSACTION</button>

    <div id="success-screen">
        <div style="font-size: 50px; color: #00ff00; margin-bottom: 20px;">✓</div>
        <div style="font-family: 'Orbitron'; color: var(--gold); letter-spacing: 2px;">VERIFIED</div>
        <p style="font-size: 12px; color: #555; margin-top: 10px;">PROVISIONING VIP ASSETS...</p>
    </div>
</div>

<!-- ✅ BOTTOM NAVIGATION -->
<nav class="bottom-nav">
    <div class="nav-item active" onclick="location.href='index.html'">
        <span class="nav-icon">🏠</span>HOME
    </div>
    <div class="nav-item active" onclick="location.href='guild.html'">
        <span class="nav-icon">🛡️</span>GUILD
    </div>
    <div class="nav-item active" onclick="location.href='Purchase.html'">
        <span class="nav-icon">💎</span>VIP
    </div>
    <div class="nav-item active" onclick="location.href='admin.html'">
        <span class="nav-icon">⚙️</span>SETTING
    </div>
</nav>

<script>
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan') || "VIP Tier";
    const price = params.get('price') || "0";
    const upiID = "guildglorybot@ptyes";

    document.getElementById('plan-title').innerText = plan;
    document.getElementById('amount-text').innerText = `₹${price}`;

    const upiUri = `upi://pay?pa=${upiID}&pn=VIP_CONSOLE&am=${price}&cu=INR`;
    
    // QR Generation
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUri)}`;

    // Mobile App Opener
    function openUpiApp() {
        window.location.href = upiUri;
    }

    // Timer
    let time = 300;
    setInterval(() => {
        let m = Math.floor(time/60);
        let s = time % 60;
        document.getElementById('timer').innerText = `0${m}:${s<10?'0':''}${s}`;
        if(time > 0) time--;
    }, 1000);

    // Verification Logic
    function startVerify() {
        const utrValue = document.getElementById('utr').value;
        if(utrValue.length < 12) {
            alert("⚠️ Error: UTR must be exactly 12 digits.");
            return;
        }

        const screen = document.getElementById('success-screen');
        screen.style.display = 'flex';

        setTimeout(() => {
            window.location.href = "success.html?status=success&tier=" + encodeURIComponent(plan);
        }, 3000);
    }

    document.getElementById('utr').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>

</body>
</html>
